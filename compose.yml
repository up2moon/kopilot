services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kopilot-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 3s
      retries: 5
    profiles:
      - web

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kopilot-backend
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    profiles:
      - was