services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kopilot-app
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 3s
      retries: 5