services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kopilot-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 10s
      timeout: 3s
      retries: 5
    profiles:
      - web

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kopilot-backend
    ports:
      - "3000:3000"
    restart: unless-stopped

    environment:
      NODE_ENV: production
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

    profiles:
      - was