name: Rolling Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGION_CODE: ${{ secrets.REGION_CODE }}
  TARGET_GROUP_NO: ${{ secrets.TARGET_GROUP_NO }}
  APP_1_TARGET_NO: ${{ secrets.APP_1_TARGET_NO }}
  APP_2_TARGET_NO: ${{ secrets.APP_2_TARGET_NO }}

  DEPLOY_SCRIPT: |
    SERVICE_NAME="frontend"
    COMPOSE_FILE="compose.yml"
    PROJECT_DIR="/opt/kopilot"

    retry_lb_command() {
      local action="$1"
      local target_no="$2"
      local app_name="$3"

      for i in {1..20}; do
        if ncloud vloadbalancer "$action" \
          --regionCode "$REGION_CODE" \
          --targetGroupNo "$TARGET_GROUP_NO" \
          --targetNoList "$target_no" \
          >/dev/null 2>&1; then

          echo "$app_name: ${action} 성공"
          return 0
        fi

        if [ "$i" -eq 20 ]; then
          echo "$app_name: ${action} 실패 - 최대 재시도 횟수 초과"
          return 1
        fi

        echo "$app_name: LB 변경 처리 중, 3초 후 재시도 ($i/20)"
        sleep 3
      done
    }

    show_logs() {
      cd "$PROJECT_DIR"

      echo "Container status:"
      docker compose -f "$COMPOSE_FILE" ps || true

      echo "Container logs:"
      docker compose -f "$COMPOSE_FILE" \
        logs --tail=200 "$SERVICE_NAME" || true

      container_id="$(
        docker compose -f "$COMPOSE_FILE" \
          ps -q "$SERVICE_NAME"
      )"

      if [ -n "$container_id" ]; then
        echo "Health check details:"
        docker inspect \
          --format='{{json .State.Health}}' \
          "$container_id" || true
      fi
    }

    deploy_app() {
      local target_no="$1"
      local app_name="$2"
      local removed_from_lb=false

      set -euo pipefail

      echo "===== $app_name 배포 시작 ====="
      echo "시각: $(date '+%Y-%m-%d %H:%M:%S')"
      hostname

      retry_lb_command removeTarget "$target_no" "$app_name"
      removed_from_lb=true

      echo "기존 연결 정리 대기"
      sleep 15

      cd "$PROJECT_DIR"

      git fetch --prune origin main
      git reset --hard "$GITHUB_SHA"

      echo "Compose 서비스 확인:"
      docker compose -f "$COMPOSE_FILE" config --services

      if ! docker compose -f "$COMPOSE_FILE" up \
        -d \
        --build \
        --force-recreate \
        --remove-orphans \
        --wait; then

        echo "$app_name 컨테이너 배포 실패"
        show_logs

        if [ "$removed_from_lb" = true ]; then
          echo "$app_name을 LB에 복구 시도"
          retry_lb_command addTarget "$target_no" "$app_name" || true
        fi

        return 1
      fi

      echo "Nginx document root:"
      docker compose -f "$COMPOSE_FILE" \
        exec -T "$SERVICE_NAME" \
        ls -la /usr/share/nginx/html

      echo "로컬 헬스체크:"
      if ! curl \
        --fail \
        --silent \
        --show-error \
        --retry 10 \
        --retry-delay 2 \
        http://localhost/; then

        echo "$app_name 헬스체크 실패"
        show_logs

        if [ "$removed_from_lb" = true ]; then
          echo "$app_name을 LB에 복구 시도"
          retry_lb_command addTarget "$target_no" "$app_name" || true
        fi

        return 1
      fi

      retry_lb_command addTarget "$target_no" "$app_name"
      removed_from_lb=false

      echo "LB 헬스체크 반영 대기"
      sleep 15

      echo "===== $app_name 배포 완료 ====="
      echo "시각: $(date '+%Y-%m-%d %H:%M:%S')"
    }

jobs:
  deploy-app-1:
    runs-on: [self-hosted, linux, app-1]

    steps:
      - name: Deploy app-1
        shell: bash
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          eval "$DEPLOY_SCRIPT"
          deploy_app "$APP_1_TARGET_NO" "app-1"

  deploy-app-2:
    needs: deploy-app-1
    runs-on: [self-hosted, linux, app-2]

    steps:
      - name: Deploy app-2
        shell: bash
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          eval "$DEPLOY_SCRIPT"
          deploy_app "$APP_2_TARGET_NO" "app-2"
