name: Rolling Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGION_CODE: ${{ secrets.REGION_CODE }}
  TARGET_GROUP_NO: ${{ secrets.TARGET_GROUP_NO }}
  APP_1_TARGET_NO: ${{ secrets.APP_1_TARGET_NO }}
  APP_2_TARGET_NO: ${{ secrets.APP_2_TARGET_NO }}

  DEPLOY_SCRIPT: |
    COMPOSE_FILE="compose.yml"
    PROJECT_DIR="/opt/kopilot"

    FRONTEND_SERVICE="frontend"
    BACKEND_SERVICE="backend"

    retry_lb_command() {
      local action="$1"
      local target_no="$2"
      local app_name="$3"

      for i in {1..20}; do
        if ncloud vloadbalancer "$action" \
          --regionCode "$REGION_CODE" \
          --targetGroupNo "$TARGET_GROUP_NO" \
          --targetNoList "$target_no" \
          >/dev/null 2>&1; then

          echo "$app_name: ${action} 성공"
          return 0
        fi

        if [ "$i" -eq 20 ]; then
          echo "$app_name: ${action} 실패"
          return 1
        fi

        echo "$app_name: LB 변경 처리 중, 3초 후 재시도 ($i/20)"
        sleep 3
      done
    }

    show_service_health() {
      local service_name="$1"

      container_id="$(
        docker compose -f "$COMPOSE_FILE" \
          ps -q "$service_name"
      )"

      if [ -z "$container_id" ]; then
        echo "$service_name 컨테이너를 찾을 수 없음"
        return 0
      fi

      echo "===== $service_name health ====="

      docker inspect \
        --format='{{json .State.Health}}' \
        "$container_id" || true
    }

    show_logs() {
      cd "$PROJECT_DIR"

      echo "===== Container status ====="
      docker compose -f "$COMPOSE_FILE" ps || true

      echo "===== Frontend logs ====="
      docker compose -f "$COMPOSE_FILE" \
        logs --tail=200 "$FRONTEND_SERVICE" || true

      echo "===== Backend logs ====="
      docker compose -f "$COMPOSE_FILE" \
        logs --tail=200 "$BACKEND_SERVICE" || true

      show_service_health "$FRONTEND_SERVICE"
      show_service_health "$BACKEND_SERVICE"
    }

    deploy_app() {
      local target_no="$1"
      local app_name="$2"
      local removed_from_lb=false

      set -euo pipefail

      echo "===== $app_name 배포 시작 ====="
      echo "시각: $(date '+%Y-%m-%d %H:%M:%S')"
      hostname

      retry_lb_command removeTarget \
        "$target_no" \
        "$app_name"

      removed_from_lb=true

      echo "기존 연결 정리 대기"
      sleep 15

      cd "$PROJECT_DIR"

      git fetch --prune origin main
      git reset --hard "$GITHUB_SHA"

      echo "Compose 서비스 확인:"
      docker compose -f "$COMPOSE_FILE" config --services

      if ! docker compose -f "$COMPOSE_FILE" up \
        -d \
        --build \
        --force-recreate \
        --remove-orphans \
        --wait \
        --wait-timeout 120; then

        echo "$app_name 컨테이너 배포 실패"
        show_logs

        if [ "$removed_from_lb" = true ]; then
          echo "$app_name LB 복구 시도"
          retry_lb_command addTarget \
            "$target_no" \
            "$app_name" || true
        fi

        return 1
      fi

      echo "Nginx document root:"
      docker compose -f "$COMPOSE_FILE" \
        exec -T "$FRONTEND_SERVICE" \
        ls -la /usr/share/nginx/html

      echo "프론트엔드 헬스체크:"
      if ! curl \
        --fail \
        --silent \
        --show-error \
        --retry 10 \
        --retry-delay 2 \
        http://localhost/; then

        echo "$app_name 프론트엔드 헬스체크 실패"
        show_logs

        if [ "$removed_from_lb" = true ]; then
          retry_lb_command addTarget \
            "$target_no" \
            "$app_name" || true
        fi

        return 1
      fi

      echo
      echo "백엔드 헬스체크:"

      if ! curl \
        --fail \
        --silent \
        --show-error \
        --retry 10 \
        --retry-delay 2 \
        http://localhost/api/health; then

        echo "$app_name 백엔드 헬스체크 실패"
        show_logs

        if [ "$removed_from_lb" = true ]; then
          retry_lb_command addTarget \
            "$target_no" \
            "$app_name" || true
        fi

        return 1
      fi

      echo
      echo "컨테이너 상태:"
      docker compose -f "$COMPOSE_FILE" ps

      retry_lb_command addTarget \
        "$target_no" \
        "$app_name"

      removed_from_lb=false

      echo "LB 헬스체크 반영 대기"
      sleep 15

      echo "===== $app_name 배포 완료 ====="
      echo "시각: $(date '+%Y-%m-%d %H:%M:%S')"
    }

jobs:
  deploy-app-1:
    runs-on: [self-hosted, linux, app-1]

    steps:
      - name: Deploy app-1
        shell: bash
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          eval "$DEPLOY_SCRIPT"
          deploy_app "$APP_1_TARGET_NO" "app-1"

  deploy-app-2:
    needs: deploy-app-1
    runs-on: [self-hosted, linux, app-2]

    steps:
      - name: Deploy app-2
        shell: bash
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          eval "$DEPLOY_SCRIPT"
          deploy_app "$APP_2_TARGET_NO" "app-2"
