name: Rolling Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGION_CODE: ${{ secrets.REGION_CODE }}

  WEB_TARGET_GROUP_NO: ${{ secrets.WEB_TARGET_GROUP_NO }}
  WAS_TARGET_GROUP_NO: ${{ secrets.WAS_TARGET_GROUP_NO }}

  WEB_1_TARGET_NO: ${{ secrets.WEB_1_TARGET_NO }}
  WEB_2_TARGET_NO: ${{ secrets.WEB_2_TARGET_NO }}
  WAS_1_TARGET_NO: ${{ secrets.WAS_1_TARGET_NO }}
  WAS_2_TARGET_NO: ${{ secrets.WAS_2_TARGET_NO }}

  DEPLOY_SCRIPT: |
    COMPOSE_FILE="compose.yml"
    PROJECT_DIR="/opt/kopilot"

    retry_lb_command() {
      local action="$1"
      local target_group_no="$2"
      local target_no="$3"
      local node_name="$4"

      local response

      for i in {1..20}; do
        if response="$(
          ncloud vloadbalancer "$action" \
            --regionCode "$REGION_CODE" \
            --targetGroupNo "$target_group_no" \
            --targetNoList "$target_no" \
            2>&1
        )"; then

          echo "$node_name: $action 성공"
          return 0
        fi

        echo "$node_name: $action 응답"
        echo "$response"

        if [ "$i" -eq 20 ]; then
          echo "$node_name: $action 최종 실패"
          return 1
        fi

        echo "$node_name: LB 변경 작업 처리 중"
        echo "$node_name: 3초 후 재시도 ($i/20)"

        sleep 3
      done
    }

    show_logs() {
      local service_name="$1"

      cd "$PROJECT_DIR"

      echo "===== Container status ====="

      docker compose \
        -f "$COMPOSE_FILE" \
        ps || true

      echo "===== $service_name logs ====="

      docker compose \
        -f "$COMPOSE_FILE" \
        logs \
        --tail=200 \
        "$service_name" || true

      local container_id

      container_id="$(
        docker compose \
          -f "$COMPOSE_FILE" \
          ps -q "$service_name"
      )"

      if [ -n "$container_id" ]; then
        echo "===== $service_name health ====="

        docker inspect \
          --format='{{json .State.Health}}' \
          "$container_id" || true
      fi
    }

    deploy_node() {
      local target_group_no="$1"
      local target_no="$2"
      local node_name="$3"
      local service_name="$4"
      local health_url="$5"

      set -euo pipefail

      echo "===== $node_name 배포 시작 ====="
      echo "시각: $(date '+%Y-%m-%d %H:%M:%S')"
      echo "호스트: $(hostname)"
      echo "서비스: $service_name"
      echo "커밋: $GITHUB_SHA"

      if ! command -v ncloud >/dev/null 2>&1; then
        echo "ncloud CLI를 찾을 수 없습니다."
        return 1
      fi

      if ! command -v docker >/dev/null 2>&1; then
        echo "docker를 찾을 수 없습니다."
        return 1
      fi

      if ! command -v curl >/dev/null 2>&1; then
        echo "curl을 찾을 수 없습니다."
        return 1
      fi

      if [ ! -d "$PROJECT_DIR/.git" ]; then
        echo "$PROJECT_DIR에 Git 저장소가 없습니다."
        return 1
      fi

      if [ ! -f "$PROJECT_DIR/$COMPOSE_FILE" ]; then
        echo "$PROJECT_DIR/$COMPOSE_FILE 파일이 없습니다."
        return 1
      fi

      echo "===== LB에서 타깃 제거 ====="

      retry_lb_command \
        removeTarget \
        "$target_group_no" \
        "$target_no" \
        "$node_name"

      echo "기존 연결 정리 대기"
      sleep 15

      cd "$PROJECT_DIR"

      echo "===== 소스 업데이트 ====="

      git fetch \
        --prune \
        origin \
        main

      git reset \
        --hard \
        "$GITHUB_SHA"

      echo "===== Compose 설정 확인 ====="

      docker compose \
        -f "$COMPOSE_FILE" \
        config --quiet

      echo "===== Compose 서비스 목록 ====="

      docker compose \
        -f "$COMPOSE_FILE" \
        config --services

      echo "===== $service_name 배포 ====="

      if ! docker compose \
        -f "$COMPOSE_FILE" \
        up \
        -d \
        --build \
        --force-recreate \
        --no-deps \
        --wait \
        --wait-timeout 120 \
        "$service_name"; then

        echo "$node_name: 컨테이너 배포 실패"

        show_logs "$service_name"

        echo "$node_name은 LB에서 제외된 상태로 유지됩니다."
        return 1
      fi

      echo "===== 로컬 헬스체크 ====="

      if ! curl \
        --fail \
        --silent \
        --show-error \
        --retry 10 \
        --retry-delay 2 \
        --retry-connrefused \
        "$health_url"; then

        echo
        echo "$node_name: 로컬 헬스체크 실패"

        show_logs "$service_name"

        echo "$node_name은 LB에서 제외된 상태로 유지됩니다."
        return 1
      fi

      echo

      docker compose \
        -f "$COMPOSE_FILE" \
        ps "$service_name"

      echo "===== LB에 타깃 재등록 ====="

      retry_lb_command \
        addTarget \
        "$target_group_no" \
        "$target_no" \
        "$node_name"

      echo "===== $node_name 배포 완료 ====="
      echo "시각: $(date '+%Y-%m-%d %H:%M:%S')"
    }

jobs:
  deploy-was-1:
    name: Deploy WAS 1
    timeout-minutes: 20

    runs-on:
      - self-hosted
      - Linux
      - X64
      - was1

    steps:
      - name: Deploy was-1
        shell: bash

        run: |
          bash -n <<< "$DEPLOY_SCRIPT"
          eval "$DEPLOY_SCRIPT"

          deploy_node \
            "$WAS_TARGET_GROUP_NO" \
            "$WAS_1_TARGET_NO" \
            "was-1" \
            "backend" \
            "http://localhost:3000/api/health"

  deploy-was-2:
    name: Deploy WAS 2

    needs:
      - deploy-was-1

    timeout-minutes: 20

    runs-on:
      - self-hosted
      - Linux
      - X64
      - was2

    steps:
      - name: Deploy was-2
        shell: bash

        run: |
          bash -n <<< "$DEPLOY_SCRIPT"
          eval "$DEPLOY_SCRIPT"

          deploy_node \
            "$WAS_TARGET_GROUP_NO" \
            "$WAS_2_TARGET_NO" \
            "was-2" \
            "backend" \
            "http://localhost:3000/api/health"

  deploy-web-1:
    name: Deploy Web 1

    needs:
      - deploy-was-2

    timeout-minutes: 20

    runs-on:
      - self-hosted
      - Linux
      - X64
      - web1

    steps:
      - name: Deploy web-1
        shell: bash

        run: |
          bash -n <<< "$DEPLOY_SCRIPT"
          eval "$DEPLOY_SCRIPT"

          deploy_node \
            "$WEB_TARGET_GROUP_NO" \
            "$WEB_1_TARGET_NO" \
            "web-1" \
            "frontend" \
            "http://localhost/"

  deploy-web-2:
    name: Deploy Web 2

    needs:
      - deploy-web-1

    timeout-minutes: 20

    runs-on:
      - self-hosted
      - Linux
      - X64
      - web2

    steps:
      - name: Deploy web-2
        shell: bash

        run: |
          bash -n <<< "$DEPLOY_SCRIPT"
          eval "$DEPLOY_SCRIPT"

          deploy_node \
            "$WEB_TARGET_GROUP_NO" \
            "$WEB_2_TARGET_NO" \
            "web-2" \
            "frontend" \
            "http://localhost/"
