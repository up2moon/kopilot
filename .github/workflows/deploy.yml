name: Rolling Deploy Test

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGION_CODE: ${{ vars.REGION_CODE }}
  TARGET_GROUP_NO: ${{ vars.TARGET_GROUP_NO }}
  APP_1_TARGET_NO: ${{ vars.APP_1_TARGET_NO }}
  APP_2_TARGET_NO: ${{ vars.APP_2_TARGET_NO }}

jobs:
  deploy-app-1:
    runs-on: [self-hosted, linux, app-1]

    steps:
      - name: Remove app-1 from load balancer
        run: |
          set -euo pipefail

          for i in {1..20}; do
            if ncloud vloadbalancer removeTarget \
              --regionCode "$REGION_CODE" \
              --targetGroupNo "$TARGET_GROUP_NO" \
              --targetNoList "$APP_1_TARGET_NO"; then

              echo "app-1 removed from target group"
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "app-1 제거 실패: 최대 재시도 횟수 초과"
              exit 1
            fi
            echo "아직 변경 중이라 실패함. 3초 후 재시도... ($i/20)"
            sleep 3
          done

      - name: Deploy app-1
        run: |
          set -euo pipefail

          echo "APP-1 START: $(date '+%Y-%m-%d %H:%M:%S')"
          hostname

          cd /opt/kopilot
          git fetch origin main
          git reset --hard "${{ github.sha }}"

          echo "app-1 deployed at $(date '+%Y-%m-%d %H:%M:%S')" > html/index.html

          docker compose -f compose.yml pull
          docker compose -f compose.yml up -d --wait

          echo "app-1 health check"
          curl -fsS http://localhost

          echo "APP-1 END: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: Add app-1 to load balancer
        run: |
          set -euo pipefail

          for i in {1..20}; do
            if ncloud vloadbalancer addTarget \
              --regionCode "$REGION_CODE" \
              --targetGroupNo "$TARGET_GROUP_NO" \
              --targetNoList "$APP_1_TARGET_NO"; then

              echo "app-1 added successfully"
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "app-1 추가 실패: 최대 재시도 횟수 초과" 
              exit 1
            fi

            echo "아직 변경 중이라 실패함. 3초 후 재시도... ($i/20)"
            sleep 3
          done

  deploy-app-2:
    needs: deploy-app-1
    runs-on: [self-hosted, linux, app-2]

    steps:
      - name: Remove app-2 from load balancer
        run: |
          set -euo pipefail

          for i in {1..20}; do
            if ncloud vloadbalancer removeTarget \
              --regionCode "$REGION_CODE" \
              --targetGroupNo "$TARGET_GROUP_NO" \
              --targetNoList "$APP_2_TARGET_NO"; then

              echo "app-2 removed successfully"
              break
            fi

            if [ "$i" -eq 20 ]; then
              echo "app-2 제거 실패: 최대 재시도 횟수 초과"
              exit 1
            fi

            echo "아직 변경 중이라 실패함. 3초 후 재시도... ($i/20)"
            sleep 3
          done

      - name: Deploy app-2
        run: |
          set -euo pipefail

          echo "APP-2 START: $(date '+%Y-%m-%d %H:%M:%S')"
          hostname

          cd /opt/kopilot
          git fetch origin main
          git reset --hard "${{ github.sha }}"
          echo "app-2 deployed at $(date '+%Y-%m-%d %H:%M:%S')" > html/index.html

          docker compose -f compose.yml pull
          docker compose -f compose.yml up -d --wait

          echo "app-2 health check"
          curl -fsS http://localhost

          echo "APP-2 END: $(date '+%Y-%m-%d %H:%M:%S')"

      - name: Add app-2 to load balancer
        run: |
          set -euo pipefail

          for i in {1..20}; do
            if ncloud vloadbalancer addTarget \
              --regionCode "$REGION_CODE" \
              --targetGroupNo "$TARGET_GROUP_NO" \
              --targetNoList "$APP_2_TARGET_NO"; then

              echo "app-2 added successfully"
              break
            fi

            if [ "$i" -eq 20 ]; then
              echo "app-2 추가 실패: 최대 재시도 횟수 초과"
              exit 1
            fi
            
            echo "아직 변경 중이라 실패함. 3초 후 재시도... ($i/20)"
            sleep 3
          done
